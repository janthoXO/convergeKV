opencollection: 1.0.0

info:
  name: ConvergeKV
config:
  protobuf:
    protoFiles:
      - type: file
        path: ../../proto/kv/kv.proto
      - type: file
        path: ../../proto/debug/debug.proto
    importPaths:
      - path: ../../proto
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: mytoken
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
