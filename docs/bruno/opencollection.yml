opencollection: 1.0.0

info:
  name: ConvergeKV
config:
  protobuf:
    protoFiles:
      - type: file
        path: ../../pkg/proto/kv.proto
      - type: file
        path: ../../pkg/proto/debug.proto
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: seed_port
      value: "7000"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
