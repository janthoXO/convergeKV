syntax = "proto3";
package replication;
option go_package = "github.com/janthoXO/convergeKV/gen/replication";

import "kv/kv.proto";

message DeltaEntry {
  string key = 1;
  string field = 2;
  bytes value_json = 3;
  kv.HLCTimestamp timestamp = 4;
  string replica_id = 5;
  bool deleted = 6;
}

message HashSyncRequest {
  string replica_id = 1;
  repeated bytes bucket_hashes = 2;
}

message HashSyncResponse {
  repeated int32 divergent_buckets = 1;
  repeated bytes bucket_hashes = 2;
}

message DeltaSyncRequest {
  string replica_id = 1;
  repeated int32 buckets = 2;
}

message DeltaSyncResponse {
  repeated DeltaEntry deltas = 1;
}

service ReplicationService {
  rpc HashSync(HashSyncRequest) returns (HashSyncResponse);
  rpc DeltaSync(DeltaSyncRequest) returns (DeltaSyncResponse);
}


