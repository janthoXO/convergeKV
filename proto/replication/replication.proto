syntax = "proto3";
package replication;
option go_package = "github.com/janthoXO/convergeKV/gen/replication";

import "kv/kv.proto";

// DeltaEntry is a single field-level version held by a node.
// Reused across all sync protocol messages.
message DeltaEntry {
  string key = 1;
  string field = 2;
  bytes value_json = 3;
  kv.HLCTimestamp timestamp = 4;
  string replica_id = 5;
  bool deleted = 6;
}

// ItemIdentifier is the minimal information needed to look up a specific
// field version in local state. Used in PullEntries to request missing entries.
message ItemIdentifier {
  string key = 1;
  string field = 2;
  uint64 physical_ms = 3;
  uint32 logical = 4;
  string replica_id = 5;
}

// ─── GetIBLT ─────────────────────────────────────────────────────────────────

message GetIBLTRequest {
  string replica_id = 1;    // initiator id, for logging
  uint32 partition_id = 2;  // which partition's IBLT to fetch
}

message GetIBLTResponse {
  bytes iblt_data = 1; // output of iblt.Encode()
}

// ─── PushEntries (client-streaming) ──────────────────────────────────────────

// PushHeader is the first message sent on a PushEntries stream.
// It declares which partition all subsequent DeltaEntry messages belong to.
// All entries in a single stream must be for the same partition.
message PushHeader {
  uint32 partition_id = 1;
}

// PushChunk is the stream element type for PushEntries.
// The initiator sends exactly one PushHeader as the first chunk, followed
// by zero or more DeltaEntry chunks.
message PushChunk {
  oneof payload {
    PushHeader header = 1;
    DeltaEntry entry  = 2;
  }
}

message PushAck {
  int32 applied = 1; // number of entries that actually updated local state
}

// ─── PullEntries (server-streaming) ──────────────────────────────────────────

message PullRequest {
  string replica_id = 1;                   // initiator id, for logging
  uint32 partition_id = 2;                 // which partition to pull from
  repeated ItemIdentifier identifiers = 3; // empty = send full partition state
}

// ─── Service ─────────────────────────────────────────────────────────────────

service SyncService {
  rpc GetIBLT     (GetIBLTRequest)    returns (GetIBLTResponse);
  rpc PushEntries (stream PushChunk)  returns (PushAck);
  rpc PullEntries (PullRequest)       returns (stream DeltaEntry);
}
