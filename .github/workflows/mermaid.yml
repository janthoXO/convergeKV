name: Compile Mermaid Diagrams

on:
  push:
    branches:
      - main
    paths:
      - "docs/**/*.mermaid"
      - ".github/workflows/mermaid.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docs/**/*.mermaid"
      - ".github/workflows/mermaid.yml"

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      # Required to allow the GitHub Actions bot to push the new SVGs back to your repo
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start mermaid-cli container
        # The official mermaid-cli image bundles Chrome and its system libraries,
        # so there is no Node/npm setup or Puppeteer browser-install needed.
        # Pin the major tag for reproducible diagram output. Start once, detached,
        # overriding the mmdc entrypoint with a shell that idles so later steps can
        # exec into the same container instead of paying startup per diagram.
        run: |
          docker run -d --name mermaid \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/data" \
            --entrypoint sh \
            ghcr.io/mermaid-js/mermaid-cli/mermaid-cli:11.15.0 \
            -c 'tail -f /dev/null'

      - name: Compile .mermaid files to .svg
        # mmdc is a symlink in the image's node_modules and is NOT on PATH, so call
        # it by full path. The image's real entrypoint also passes the bundled
        # Puppeteer config (sets Chromium's executablePath + --no-sandbox); since we
        # overrode the entrypoint with a shell, we must re-supply it via -p here.
        run: |
          docker exec mermaid sh -c '
            mmdc=/home/mermaidcli/node_modules/.bin/mmdc
            rc=0
            # Read from a file (not a pipe) so rc set inside the loop survives.
            find /data/docs -type f -name "*.mermaid" -print > /tmp/diagrams.txt
            while read -r file; do
              if [ ! -s "$file" ]; then
                echo "Skipping empty file: $file"
                continue
              fi
              echo "Compiling $file..."
              if ! "$mmdc" -p /puppeteer-config.json -i "$file" -o "${file%.mermaid}.svg"; then
                echo "ERROR: failed to render $file"
                rc=1
              fi
            done < /tmp/diagrams.txt
            exit $rc
          '

      - name: Stop mermaid-cli container
        if: always()
        run: docker rm -f mermaid 2>/dev/null || true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet docs/**/*.svg 2>/dev/null && git diff --quiet -- "docs/*.svg" 2>/dev/null; then
            # Also handle new (untracked) SVG files
            if [ -z "$(git ls-files --others --exclude-standard 'docs/*.svg' 'docs/**/*.svg')" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and Push SVGs
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: auto-compile mermaid diagrams to svg"
          # Only commit the generated SVGs so we don't accidentally push other WIP files
          file_pattern: 'docs/*.svg docs/**/*.svg'