syntax = "proto3";
package replication;
option go_package = "github.com/janthoXO/convergeKV/gen/replication";

import "kv/kv.proto";

// DeltaEntry is a single field-level version held by a node.
// Reused across all sync protocol messages.
message DeltaEntry {
  string key = 1;
  string field = 2;
  bytes value_json = 3;
  kv.HLCTimestamp timestamp = 4;
  string replica_id = 5;
  bool deleted = 6;
}

// ItemIdentifier is the minimal information needed to look up a specific
// field version in local state. Used in Round 2 of the IBLT protocol to
// tell the initiator which entries to send back.
message ItemIdentifier {
  string key = 1;
  string field = 2;
  uint64 physical_ms = 3;
  uint32 logical = 4;
  string replica_id = 5;
}

// ─── IBLT Exchange (Round 1) ─────────────────────────────────────────────────

message IBLTExchangeRequest {
  string replica_id = 1;
  bytes iblt_data = 2; // serialised IBLT (output of iblt.Encode())
}

message IBLTExchangeResponse {
  bool decodable = 1; // whether the responder successfully decoded the diff
  repeated DeltaEntry items_for_initiator = 2; // entries the initiator is missing
  repeated ItemIdentifier i_need = 3;           // items the responder needs from initiator
}

// ─── Push Entries (write-path push) ─────────────────────────────────────────

message PushEntriesRequest {
  string replica_id = 1;
  repeated DeltaEntry entries = 2;
}

message PushEntriesResponse {
  int32 applied = 1; // number of entries that actually updated local state
}

// ─── Full State Sync (fallback) ──────────────────────────────────────────────

message FullStateSyncRequest {
  string replica_id = 1;
  repeated DeltaEntry entries = 2; // sender's full state
}

message FullStateSyncResponse {
  repeated DeltaEntry entries = 1; // responder's full state
}

// ─── Service ─────────────────────────────────────────────────────────────────

service SyncService {
  rpc IBLTExchange  (IBLTExchangeRequest)   returns (IBLTExchangeResponse);
  rpc PushEntries   (PushEntriesRequest)    returns (PushEntriesResponse);
  rpc FullStateSync (FullStateSyncRequest)  returns (FullStateSyncResponse);
}
