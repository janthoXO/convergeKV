x-shared-env: &shared-env
  GRPC_PORT:   "50051"
  GOSSIP_PORT: "7946"
  GOSSIP_BIND: "0.0.0.0"
  DATA_DIR:    "/data"
  RF:          "3"
  SYNC_MS:     "20000"
  IBLT_CELLS:  "512"

x-node-defaults: &node-defaults
  build: .
  restart: unless-stopped
  networks:
    - convergekv
  volumes:
    - /data  # anonymous volume — each container gets its own, replicas don't share data

networks:
  convergekv:
    driver: bridge

services:
  # Static bootstrap node. Workers discover the cluster through it.
  seed:
    <<: *node-defaults
    container_name: seed
    hostname: seed
    environment:
      <<: *shared-env
      REPLICA_ID:  "seed"
      SEEDS:       ""  # bootstrap node; no seeds needed
    ports:
      - "50051:50051"

  # Scalable workers. Change replicas here, or override with --scale worker=N.
  # REPLICA_ID is unset — each container falls back to $HOSTNAME (auto-assigned
  # by Docker as <project>-worker-<index>, unique per replica).
  worker:
    <<: *node-defaults
    depends_on:
      - seed
    deploy:
      replicas: 5
    environment:
      <<: *shared-env
      SEEDS:       "seed:7946"
    ports:
      - "50051"  # random host port per replica; find with: docker compose port worker 50051 --index N
