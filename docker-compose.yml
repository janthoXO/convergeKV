services:
  seed:
    build: .
    environment:
      CONVERGEKV_DATA_DIR: /data
      CONVERGEKV_GOSSIP_ADDR: ":7946"
    volumes:
      - seed-data:/data
    ports:
      - "7000:7000"
    networks:
      - convergekv

  node:
    build: .
    environment:
      CONVERGEKV_DATA_DIR: /data
      CONVERGEKV_GOSSIP_ADDR: ":7946"
      CONVERGEKV_SEEDS: "seed:7946"
    ports:
      - "7000"
    depends_on:
      - seed
    # The node service is horizontally scalable: bump the replica count (or
    # override it with `docker compose up --scale node=N`).
    deploy:
      replicas: 3
    networks:
    - convergekv

  # Monitoring stack: opt in with `docker compose --profile monitoring up`.
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - seed
      - node

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deploy/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

networks:
  convergekv:
    driver: bridge

volumes:
  seed-data:
  grafana-data:
