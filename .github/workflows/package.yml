name: Package

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/build.yml'
      - '.github/workflows/package.yml'
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: 'latest'

jobs:
  build:
    uses: ./.github/workflows/build.yml

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t convergekv:latest .

      - name: Save Docker Image
        run: docker save convergekv:latest -o convergekv-${{ inputs.version || 'latest' }}.tar

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.version || 'latest' }}
          path: convergekv-${{ inputs.version || 'latest' }}.tar
          if-no-files-found: error
